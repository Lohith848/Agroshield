services:
  - type: web
    name: agroshield-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      # Install Python dependencies
      pip install -r requirements.txt
      # Download YOLOv8 model if not present
      if [ ! -f "models/yolov8n.pt" ]; then
        echo "Downloading YOLOv8 nano model..."
        mkdir -p models
        curl -L "https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n.pt" -o models/yolov8n.pt
      fi
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # CRITICAL: Set all secrets in Render dashboard manually
      - key: SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
      - key: OPENWEATHER_API_KEY
      - key: AGROMONITORING_API_KEY
      - key: NEWS_API_KEY
      - key: MODEL_PATH
        value: ./models/yolov8n.pt
