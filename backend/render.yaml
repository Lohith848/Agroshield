services:
  - type: web
    name: agroshield-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      # Install Python dependencies
      pip install -r requirements.txt
      # Download YOLOv8 model if not present
      if [ ! -f "models/yolov8n.pt" ]; then
        echo "Downloading YOLOv8 nano model..."
        mkdir -p models
        curl -L "https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n.pt" -o models/yolov8n.pt
      fi
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Set these in Render dashboard -> Environment tab (marked as secret)
      - key: SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
      # Pre-configured API keys (can be changed if needed)
      - key: OPENWEATHER_API_KEY
        value: 10d719934d01b27f7790d4babc9ca397
      - key: AGROMONITORING_API_KEY
        value: bb0664ed43c153aa072c760594d775a7
      - key: NEWS_API_KEY
        value: 1a06cee205294e3da903b41015407b76
      - key: MODEL_PATH
        value: ./models/yolov8n.pt
